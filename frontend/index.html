<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-circle">J</div>
                <div>
                    <h1>JARVIS</h1>
                    <span id="status-text">Offline</span>
                </div>
            </div>
            <div id="status-dot" class="status-dot offline"></div>
        </div>

        <!-- Chat Box -->
        <div class="chat-box" id="chat-box">
            <div class="message jarvis">
                <div class="bubble">Hello Zain! I am Jarvis. Press mic or type a command.</div>
            </div>
        </div>

        <!-- Visualizer -->
        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <!-- Text Input -->
        <div class="text-input-row">
            <input type="text" id="text-input" placeholder="Type a command..." onkeydown="handleKey(event)" />
            <button class="send-btn" onclick="sendText()">
                <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                </svg>
            </button>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="mic-btn" id="mic-btn" onclick="toggleListen()">
                <svg viewBox="0 0 24 24" fill="white" width="32" height="32">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            <p class="mic-label" id="mic-label">Click to Speak</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
